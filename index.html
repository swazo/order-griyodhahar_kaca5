<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
body{

    radial-gradient(circle at 80% 90%, rgba(0,0,0,0.35), transparent 40%),
    url("https://images.unsplash.com/photo-1519710164239-da123dc03ef4?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color:#2d2a26;
  padding:20px;
}
.container{max-width:1000px;margin:auto;}
.header{text-align:center;margin-bottom:28px;}

.title{
  font-size:36px;
  font-weight:700;
  letter-spacing:.6px;
  text-align:center;
  color:#e6cfa3; /* emas solid biar pasti kelihatan */
  text-shadow:
    0 2px 6px rgba(0,0,0,0.45),
    0 0 18px rgba(200,169,126,0.35);
}

.error-field{
  border-color:#ef4444 !important;
  box-shadow:0 0 0 3px rgba(239,68,68,.18);
  animation:shake .25s linear 2;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-3px)}
  50%{transform:translateX(3px)}
  75%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}


.card{
  background:rgba(255,255,255,0.96);
  border:1px solid rgba(200,169,126,0.45);
  box-shadow:
    0 25px 60px rgba(0,0,0,0.35),
    0 8px 20px rgba(0,0,0,0.18);
  padding:30px;
  border-radius:22px;
  margin-bottom:24px;
  backdrop-filter: blur(6px);
  position:relative;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:4px;
  background:linear-gradient(90deg,#c8a97e,#e6cfa3,#c8a97e);
  border-top-left-radius:22px;
  border-top-right-radius:22px;
}

.subtitle{
  text-align:center;
  margin-top:6px;
  font-size:15px;
  color:#8b6a3e;
  font-weight:500;
  letter-spacing:.4px;
  position:relative;
  display:inline-block;
}

.subtitle::after{
  content:"";
  display:block;
  width:60%;
  height:2px;
  margin:6px auto 0;
  background:linear-gradient(90deg,#c8a97e,transparent);
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:14px;}
label,input,select{width:100%;}
input,select{
  padding:12px 14px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #d6d3ce;
  background:#ffffff;
  color:#2d2a26;
  transition:.2s;
}

input:focus,select:focus{
  outline:none;
  border-color:#c8a97e;
  box-shadow:0 0 0 3px rgba(200,169,126,.15);
}

.btn{
  padding:13px 22px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:all .25s ease;
}
.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.primary{
  background: linear-gradient(135deg,#c8a97e,#b89663,#a8844f);
  color:#fff;
  box-shadow:0 10px 24px rgba(184,150,99,.45);
}

.primary:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 16px 34px rgba(184,150,99,.55);
}
.outline{
  background:#fff;
  border:1px solid #d6d3ce;
  color:#6b4f2a;
}

.outline:hover{
  background:#f3ede4;
}

table{width:100%;border-collapse:collapse;margin-top:16px;}
th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);}
.total{
  font-size:26px;
  color:#b89663;
  font-weight:700;
  margin-top:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:16px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th{
  background:#f3ede4;
  color:#6b4f2a;
  font-weight:600;
}

th,td{
  padding:13px;
  border-bottom:1px solid #eee7dc;
}

.badge{
  display:inline-block;padding:6px 12px;border-radius:999px;font-size:12px;
  font-weight:600;margin-left:10px;background:rgba(251,191,36,.15);
  color:#fbbf24;border:1px solid rgba(251,191,36,.35);
}

.slide-hide{max-height:0;overflow:hidden;opacity:0;transform:translateY(-8px);transition:all .35s ease;}
.slide-show{max-height:200px;opacity:1;transform:translateY(0);transition:all .35s ease;}

.action-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.action-right{margin-left:auto;}

@media(max-width:768px){
  .grid-2{grid-template-columns:1fr}
}
.tambah-row{
  display:flex;
  justify-content:center; /* tengah horizontal */
  margin-top:10px;
  margin-bottom:10px;
}
.tambah-row .btn{
  min-width:160px;
  font-size:15px;
}
#tabel th:nth-child(2),
#tabel th:nth-child(3),
#tabel th:nth-child(4),
#tabel td:nth-child(2),
#tabel td:nth-child(3),
#tabel td:nth-child(4){
  text-align: center;
}
#tabel th:first-child,
#tabel td:first-child{
  text-align:center !important;
}

@media(max-width:480px){
  .action-row{
    flex-direction: column;
    gap:10px;
    align-items: stretch; /* biar tombol full width */
  }
  .action-row .btn{
    width:100%;  /* tombol full lebar container */
    font-size:16px; /* bisa sedikit lebih besar biar gampang diklik */
  }
  .action-right{
    margin-left:0; /* hilangkan margin kiri di mobile */
  }
}

@media(max-width:480px){
  .tambah-row .btn{
    width:100%;
    font-size:16px;
  }
}

/* ===== QTY INLINE TABLE ===== */
.qty-inline{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#f3ede4;
  border-radius:999px;
  padding:4px 8px;
  width:fit-content;
  margin:auto;
}

.qty-mini{
  width:26px;
  height:26px;
  border-radius:50%;
  border:none;
  background:#fff;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}

.qty-mini:hover{
  background:#e9dcc7;
  transform:scale(1.1);
}

.qty-number{
  min-width:18px;
  font-weight:600;
  cursor:pointer;
  padding:4px 10px;
  border-radius:6px;
}

.qty-number:hover{
  background:#f3ede4;
}

#tabel{
  width:100%;
}

/* Desktop tetap rapi */
@media(min-width:481px){
  #tabel{
    table-layout: fixed;
  }

  #tabel th,
  #tabel td{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
}

#tabel th,
#tabel td{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

@media(max-width:480px){
  #tabel td:nth-child(4) .btn{
    padding:4px 6px;
    font-size:13px;
    border-radius:10px;
  }
}

/* ===== MOBILE TABLE SCROLL ===== */
.table-wrap{
  width:100%;
  overflow-x:visible;
}

@media(max-width:480px){
  #tabel{
    min-width:420px;
  }
}

/* ================= MOBILE FIX: SEMUA KELIHATAN ================= */
@media (max-width:480px){

  .table-wrap{
    overflow:visible !important;
  }

  #tabel thead{
    display:none;
  }

  #tabel tr{
    display:block;
    background:#fff;
    border-radius:14px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
  }

  #tabel td{
    border:none;
    padding:4px 0;
  }

  /* BARIS ATAS: NAMA MENU */
  #tabel td:nth-child(1){
    font-weight:600;
    font-size:15px;
    margin-bottom:6px;
  }

  /* BARIS BAWAH: qty + subtotal + hapus sejajar */
  #tabel td:nth-child(2),
  #tabel td:nth-child(3),
  #tabel td:nth-child(4){
    display:inline-flex;
    align-items:center;
    vertical-align:middle;
  }

  /* bungkus jadi satu baris */
  #tabel tr{
    display:block;
  }

  /* container baris bawah */
  #tabel tr::after{
    content:"";
    display:block;
    clear:both;
  }

  #tabel td:nth-child(2){ width:45%; }
  #tabel td:nth-child(3){ width:35%; font-weight:600; color:#b08d57; }
  #tabel td:nth-child(4){ width:20%; text-align:right; }
}

.qty-menu button:hover{

.menu-list{
  border:1px solid #ddd;
  border-radius:10px;

  overflow-y:auto;
  margin-top:6px;

.menu-item{
  padding:10px 12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  transition:.2s;
  user-select:none;
}

.menu-item:hover{
  background:#f3ede4;
}

.menu-item:last-child{
  border-bottom:none;
}
.menu-clicked{
  animation:menuFlash .35s ease;
}

@keyframes menuFlash{
  0%{background:#f3ede4;}
  100%{background:white;}
}

.tableFlash{
  animation:tableFlash .25s ease;
}

@keyframes tableFlash{
  0%{transform:scale(1);}
  50%{transform:scale(1.01);}
  100%{transform:scale(1);}

<div class="card">

<div class="grid-2">

<div>

Pilih kategori dulu
</div>

</div>

    <thead>
      <tr>
        <th>Menu</th>
        <th>Qty</th>
        <th>Subtotal</th>
        <th>Hapus</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="total">Total: Rp <span id="total">0</span></div>
<br>

      </tr>
      <tr>

      </tr>
      <tr>

      </tr>
      <tr style="font-weight:700;color:#b89663;">

      </tr>
    </tbody>
  </table>
</div>

<div class="action-row">
  <button class="btn primary" onclick="kirimWA()">📲 Kirim ke WhatsApp Restoran</button>
  <button class="btn outline action-right" onclick="resetOrder()">🔄 Reset Order</button>
</div>

</div>
</div>

function fokusError(el){
  el.classList.add("error-field");
  el.focus();
  el.scrollIntoView({behavior:"smooth", block:"center"});
  
  setTimeout(()=>{
    el.classList.remove("error-field");
  },1500);
}

let orders=[],total=0;
const totalEl=document.getElementById("total");

function toggleMeja(){
  const tipe=tipeBelanja.value;
  const meja=posisi;
  const wrap=wrapMeja;
  const badge=badgeTipe;

  if(tipe==="Take-away"){
    meja.disabled=true;
    meja.selectedIndex=0;
    wrap.classList.replace("slide-show","slide-hide");
    orang.value=1;
    badge.style.display="inline-block";
    badge.textContent="TAKE-AWAY 🥡";
  } else if(tipe==="Dine-in Puasa"){
    meja.disabled=true;
    meja.selectedIndex=0;
    wrap.classList.replace("slide-show","slide-hide");
    badge.style.display="inline-block";
    badge.textContent="DINE-IN PUASA 🌙";
  } else if(tipe==="Dine-in"){
    meja.disabled=false;
    wrap.classList.replace("slide-hide","slide-show");
    badge.style.display="inline-block";
    badge.textContent="DINE-IN 🍽️";
  } else{
    badge.style.display="none";
  }
}

function filterMenu(){

  const list = document.getElementById("menuList");
  const k = kategori.value;

  list.innerHTML = "";

  if(!menuDB[k]){
    list.innerHTML = "Pilih kategori dulu";
    return;
  }

  menuDB[k].forEach(m=>{

    list.innerHTML += `
      <div class="menu-item"
      onclick="klikMenu(this,'${m.nama}',${m.harga})">
      ${m.nama}
      </div>
    `;

  });

}

function klikMenu(el,nama,harga){

  el.classList.add("menu-clicked");

  setTimeout(()=>{
    el.classList.remove("menu-clicked");
  },350);

  tambahMenu(nama,harga);

}

function tambahMenu(nama,harga){

  let existing = orders.find(o => o.nama === nama);

  if(existing){
    existing.qty += 1;
    existing.subtotal = existing.qty * existing.harga;
  }else{
    orders.push({
      nama:nama,
      qty:1,
      harga:harga,
      subtotal:harga
    });
  }

  total = orders.reduce((s,o)=>s+o.subtotal,0);

  render();

  // animasi tabel
  const table = document.getElementById("tabel");
  table.classList.add("tableFlash");

  setTimeout(()=>{
    table.classList.remove("tableFlash");
  },250);

}

function tambah(){
  if(!kategori.value){
    alert("Kategori wajib diisi!");
    return fokusError(kategori);
  }

  if(!menu.value){
    alert("Menu wajib diisi!");
    return fokusError(menu);
  }

  const val = menu.value;
  const qtyVal = qtySelected;
  const [nama,h] = val.split("|");
  const harga = parseInt(h);

  orders.push({
    nama,
    qty: qtyVal,
    harga: harga,
    subtotal: harga * qtyVal
  });

  total = orders.reduce((s,o)=>s+o.subtotal,0);
  render();

  // reset form
  kategori.value="";
  menu.innerHTML='<option value="">-- Pilih Menu --</option>';
  menu.value="";

  // reset qty
  qtySelected = 1;
  document.getElementById("qtyValue").textContent = 1;

  kategori.focus();
}

function render(){
  const tb=document.querySelector("#tabel tbody");
  tb.innerHTML="";

  orders.forEach((o,i)=>{
    tb.innerHTML+=`
    <tr>
      <td>${o.nama}</td>

<td>
  <div class="qty-inline">
    <button class="qty-mini" onclick="editQty(${i}, -1)">−</button>
    <span class="qty-number">${o.qty}</span>
    <button class="qty-mini" onclick="editQty(${i}, 1)">+</button>
  </div>
</td>

      <td>Rp ${rupiah(o.subtotal)}</td>

      <td>
        <button class="btn outline" onclick="hapusItem(${i})">❌</button>
      </td>
    </tr>`;
  });

  totalEl.textContent=rupiah(total);
  updateSummary();
}

function updateSummary(){
  const totalItem = orders.length;
  const totalQty = orders.reduce((s,o)=>s+o.qty,0);
  const totalBelanja = total;
  const dpVal = parseInt(dp.value) || 0;
  const sisa = totalBelanja - dpVal;

  document.getElementById("sumItem").textContent = totalItem;
  document.getElementById("sumQty").textContent = totalQty;
  document.getElementById("sumTotal").textContent = rupiah(totalBelanja);
  document.getElementById("sumDP").textContent = rupiah(dpVal);
  document.getElementById("sumSisa").textContent = rupiah(Math.max(sisa,0));
}

function hapusItem(i){
  orders.splice(i,1);
  total=orders.reduce((s,o)=>s+o.subtotal,0);
  render();
}

function resetOrder(){
  orders = [];
  total = 0;
  render();

  // reset semua input
  document.querySelectorAll("input").forEach(el => el.value = "");
  document.querySelectorAll("select").forEach(el => el.selectedIndex = 0);

  toggleMeja();
   updateSummary();
}
function validasiNama(el){el.value=el.value.replace(/[^a-zA-Z\s]/g,"");}
function rupiah(n){return n.toLocaleString("id-ID");}

toggleMeja();
dp.addEventListener("input", updateSummary);

function editQty(index, change){

  orders[index].qty += change;

  if(orders[index].qty <= 0){
    orders.splice(index,1);
  }else{
    orders[index].subtotal =
      orders[index].qty * orders[index].harga;
  }

  total = orders.reduce((s,o)=>s+o.subtotal,0);
  render();
}

function toggleQtyEdit(index){

  const edit = document.getElementById("qtyEdit"+index);

  if(edit.style.display === "none"){
    edit.style.display = "inline-flex";
  }else{
    edit.style.display = "none";
  }

}

function pilihMenu(){

  const val = menu.value;
  if(!val) return;

  const [nama,h] = val.split("|");
  const harga = parseInt(h);

  // cek apakah menu sudah ada
  let existing = orders.find(o => o.nama === nama);

  if(existing){
    existing.qty += 1;
    existing.subtotal = existing.qty * existing.harga;
  }else{
    orders.push({
      nama:nama,
      qty:1,
      harga:harga,
      subtotal:harga
    });
  }

  total = orders.reduce((s,o)=>s+o.subtotal,0);
  render();

  // reset dropdown
  menu.value="";
}
