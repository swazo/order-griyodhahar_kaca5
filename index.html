*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
body{
  background: linear-gradient(180deg,#f8f5f0 0%, #f1ece4 100%);
  color:#2d2a26;
  padding:20px;
}
.container{max-width:1000px;margin:auto;}
.header{text-align:center;margin-bottom:28px;}
.title{
  font-size:34px;
  font-weight:700;
  letter-spacing:.5px;
  background: linear-gradient(135deg,#8b6a3e,#c8a97e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:center;
}

.card{
  background:#ffffff;
  border:1px solid #e7dfd4;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.06),
    0 2px 6px rgba(0,0,0,0.04);
  padding:28px;
  border-radius:20px;
  margin-bottom:22px;
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:14px;}
label,input,select{width:100%;}
input,select{
  padding:12px 14px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #d6d3ce;
  background:#ffffff;
  color:#2d2a26;
  transition:.2s;
}

input:focus,select:focus{
  outline:none;
  border-color:#c8a97e;
  box-shadow:0 0 0 3px rgba(200,169,126,.15);
}

.btn{
  padding:13px 22px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:all .25s ease;
}
.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.primary{
  background: linear-gradient(135deg,#c8a97e,#b89663);
  color:#fff;
  box-shadow:0 6px 16px rgba(184,150,99,.35);
}

.primary:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(184,150,99,.45);
}
.outline{
  background:#fff;
  border:1px solid #d6d3ce;
  color:#6b4f2a;
}

.outline:hover{
  background:#f3ede4;
}

table{width:100%;border-collapse:collapse;margin-top:16px;}
th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);}
.total{
  font-size:26px;
  color:#b89663;
  font-weight:700;
  margin-top:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:16px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th{
  background:#f3ede4;
  color:#6b4f2a;
  font-weight:600;
}

th,td{
  padding:13px;
  border-bottom:1px solid #eee7dc;

.badge{

  font-weight:600;margin-left:10px;background:rgba(251,191,36,.15);
  color:#fbbf24;border:1px solid rgba(251,191,36,.35);

.slide-hide{max-height:0;overflow:hidden;opacity:0;transform:translateY(-8px);transition:all .35s ease;}
.slide-show{max-height:200px;opacity:1;transform:translateY(0);transition:all .35s ease;}

.action-row{

  justify-content:space-between;

.action-right{margin-left:auto;}

let orders=[],total=0;
const totalEl=document.getElementById("total");

function toggleMeja(){
  const tipe=tipeBelanja.value;
  const meja=posisi;
  const wrap=wrapMeja;
  const badge=badgeTipe;

  if(tipe==="Take-away"){
    meja.disabled=true;
    meja.selectedIndex=0;
    wrap.classList.replace("slide-show","slide-hide");
    orang.value=1;
    badge.style.display="inline-block";
    badge.textContent="TAKE-AWAY 🥡";
  } else if(tipe==="Dine-in Puasa"){
    meja.disabled=true;
    meja.selectedIndex=0;
    wrap.classList.replace("slide-show","slide-hide");
    badge.style.display="inline-block";
    badge.textContent="DINE-IN PUASA 🌙";
  } else if(tipe==="Dine-in"){
    meja.disabled=false;
    wrap.classList.replace("slide-hide","slide-show");
    badge.style.display="inline-block";
    badge.textContent="DINE-IN 🍽️";
  } else{
    badge.style.display="none";
  }
}

function filterMenu(){
  menu.innerHTML='<option value="">-- Pilih Menu --</option>';
  const k=kategori.value;
  if(!menuDB[k]) return;
  menuDB[k].forEach(m=>{
    const o=document.createElement("option");
    o.value=`${m.nama}|${m.harga}`;
    o.textContent=m.nama;
    menu.appendChild(o);
  });
}

function tambah(){
  const val=menu.value;
  const qtyVal=parseInt(qty.value);
  if(!val||!qtyVal) return alert("Lengkapi pesanan!");
  const [nama,h]=val.split("|");
  const harga=parseInt(h);
  orders.push({nama,qty:qtyVal,subtotal:harga*qtyVal});
  total=orders.reduce((s,o)=>s+o.subtotal,0);
  render();
  qty.value="";
}

function render(){
  const tb=document.querySelector("#tabel tbody");
  tb.innerHTML="";
  orders.forEach((o,i)=>{
    tb.innerHTML+=`<tr>
      <td>${o.nama}</td>
      <td>${o.qty}</td>
      <td>Rp ${rupiah(o.subtotal)}</td>
      <td><button class="btn outline" onclick="hapusItem(${i})">❌</button></td>
    </tr>`;
  });
  totalEl.textContent=rupiah(total);
}

function hapusItem(i){
  orders.splice(i,1);
  total=orders.reduce((s,o)=>s+o.subtotal,0);
  render();
}

function kirimWA(){
  const tipe=tipeBelanja.value;
  if(!nama.value||!orang.value||!tipe||orders.length===0)
    return alert("Data belum lengkap!");

  if(tipe==="Dine-in" && !posisi.value)
    return alert("Pilih meja!");

  if(!confirm("Apakah kamu yakin dengan orderanmu?")) return;

  let text=`Griyo Dhahar Kaca5 Orders%0A`;
  text+=`Nama: ${nama.value}%0A`;
  text+=`Jumlah Orang: ${orang.value}%0A`;
  text+=`Tipe: ${tipe}%0A`;
  text+=`Meja: ${posisi.value||"-"}%0A`;
  text+=`MENU:%0A`;
  orders.forEach(o=>text+=`- ${o.nama} x${o.qty}%0A`);
  text+=`%0ATotal: Rp ${rupiah(total)}`;

  window.open(`https://wa.me/6282116677330?text=${text}`,"_blank");
}

function resetOrder(){location.reload();}
function validasiNama(el){el.value=el.value.replace(/[^a-zA-Z\s]/g,"");}
function rupiah(n){return n.toLocaleString("id-ID");}
